<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1E3A5F">
  <title>Sin Conexión - MotoGremio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #F8FAFC;
      color: #1E293B;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      box-sizing: border-box;
      padding: 20px;
    }
    .card {
      background: white;
      padding: 40px 32px;
      border-radius: 16px;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1), 0 20px 25px -5px rgb(0 0 0 / 0.1);
      max-width: 420px;
      width: 100%;
      text-align: center;
      border: 1px solid #E2E8F0;
    }
    .icon-container {
      background-color: #FEF3C7;
      color: #D97706;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    h1 {
      font-size: 20px;
      font-weight: 700;
      color: #1E3A5F;
      margin: 0 0 12px 0;
    }
    p {
      font-size: 14px;
      color: #64748B;
      line-height: 1.6;
      margin: 0 0 24px 0;
    }
    .btn {
      display: inline-block;
      width: 100%;
      padding: 12px 0;
      background-color: #1E3A5F;
      color: white;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .btn:hover {
      background-color: #152a45;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-container">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m19 19-3.5-3.5"/>
        <path d="M5 21a3 3 0 0 1-3-3v-7a3 3 0 0 1 3-3h14a3 3 0 0 1 3 3v7a3 3 0 0 1-3 3"/>
        <line x1="2" x2="22" y1="13" y2="13"/>
        <line x1="12" x2="12" y1="9" y2="21"/>
      </svg>
    </div>
    <h1>Sin conexión</h1>
    <p>MotoGremio necesita internet para sincronizar datos de compañías, documentos, cobros y reportes.<br>Revisa tu conexión e intenta nuevamente.</p>
    <button class="btn" onclick="window.location.reload()">Reintentar conexión</button>
  </div>
</body>
</html>
